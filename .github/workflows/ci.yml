name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi==0.115.12 uvicorn==0.30.6

      - name: Run backend test suite
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s tests

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck and build
        run: npm run build
